<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520">
  <style>
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .bg { fill: #1e1e2e; }
    .titlebar { fill: #313244; }
    .t { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13px; }
    .prompt { fill: #a6e3a1; }
    .cmd { fill: #cdd6f4; }
    .blocked { fill: #f38ba8; font-weight: bold; }
    .warn { fill: #fab387; }
    .pass { fill: #a6e3a1; }
    .dim { fill: #6c7086; }
    .check { fill: #a6e3a1; }
    .x { fill: #f38ba8; }
    .title { fill: #bac2de; font-size: 12px; }
    .dot1 { fill: #f38ba8; }
    .dot2 { fill: #fab387; }
    .dot3 { fill: #a6e3a1; }

    .scene1 { animation: fadeIn 0.3s ease 0.5s both; }
    .s1-l1 { animation: fadeIn 0.2s ease 1.0s both; }
    .s1-l2 { animation: fadeIn 0.2s ease 1.4s both; }
    .s1-l3 { animation: fadeIn 0.2s ease 1.7s both; }
    .s1-l4 { animation: fadeIn 0.2s ease 2.0s both; }
    .s1-l5 { animation: fadeIn 0.2s ease 2.3s both; }
    .s1-l6 { animation: fadeIn 0.2s ease 2.6s both; }
    .s1-l7 { animation: fadeIn 0.2s ease 2.9s both; }
    .s1-l8 { animation: fadeIn 0.2s ease 3.2s both; }
    .s1-l9 { animation: fadeIn 0.2s ease 3.6s both; }
    .s1-l10 { animation: fadeIn 0.2s ease 4.0s both; }

    .scene2 { animation: fadeIn 0.3s ease 5.5s both; }
    .s2-l1 { animation: fadeIn 0.2s ease 6.0s both; }
    .s2-l2 { animation: fadeIn 0.2s ease 6.3s both; }
    .s2-l3 { animation: fadeIn 0.2s ease 6.6s both; }
    .s2-l4 { animation: fadeIn 0.2s ease 6.9s both; }
    .s2-l5 { animation: fadeIn 0.2s ease 7.2s both; }
    .s2-l6 { animation: fadeIn 0.2s ease 7.8s both; }

    .scene3 { animation: fadeIn 0.3s ease 9.0s both; }
    .s3-l1 { animation: fadeIn 0.2s ease 9.3s both; }
    .s3-l2 { animation: fadeIn 0.2s ease 9.6s both; }
    .s3-l3 { animation: fadeIn 0.2s ease 9.9s both; }
  </style>

  <!-- Terminal window -->
  <rect class="bg" width="820" height="520" rx="10"/>
  <rect class="titlebar" width="820" height="36" rx="10"/>
  <rect class="bg" y="26" width="820" height="10"/>
  <circle cx="20" cy="18" r="6" class="dot1"/>
  <circle cx="40" cy="18" r="6" class="dot2"/>
  <circle cx="60" cy="18" r="6" class="dot3"/>
  <text x="410" y="22" text-anchor="middle" class="title t">claude-senior — pre-commit quality gate</text>

  <!-- Scene 1: Commit blocked -->
  <g class="scene1">
    <text x="20" y="60" class="t prompt">$</text>
    <text x="35" y="60" class="t cmd"> git commit -m "feat: add tax calculator"</text>
  </g>

  <g class="s1-l1">
    <text x="20" y="90" class="t blocked">COMMIT BLOCKED — Auto-checks failed (3 files changed, 47 insertions)</text>
  </g>

  <g class="s1-l2">
    <text x="20" y="120" class="t dim">─────────────────────────────────────────────────────</text>
  </g>

  <g class="s1-l3">
    <text x="20" y="145" class="t x">✗</text>
    <text x="40" y="145" class="t warn">CONSOLE.LOG FOUND in staged changes:</text>
  </g>
  <g class="s1-l4">
    <text x="40" y="165" class="t dim">+  console.log("tax result:", totalTax);</text>
  </g>

  <g class="s1-l5">
    <text x="20" y="195" class="t x">✗</text>
    <text x="40" y="195" class="t warn">TYPE 'any' FOUND in staged TS changes:</text>
  </g>
  <g class="s1-l6">
    <text x="40" y="215" class="t dim">+  function processData(input: any): any {</text>
  </g>

  <g class="s1-l7">
    <text x="20" y="245" class="t x">✗</text>
    <text x="40" y="245" class="t warn">TODO/FIXME found in staged changes:</text>
  </g>
  <g class="s1-l8">
    <text x="40" y="265" class="t dim">+  // TODO: handle edge case for leap years</text>
  </g>

  <g class="s1-l9">
    <text x="20" y="295" class="t dim">─────────────────────────────────────────────────────</text>
  </g>
  <g class="s1-l10">
    <text x="20" y="320" class="t blocked">Fix the issues above, then retry commit.</text>
  </g>

  <!-- Scene 2: AI fixes and retries -->
  <g class="scene2">
    <text x="20" y="355" class="t dim">... AI fixes all 3 issues ...</text>
  </g>

  <g class="s2-l1">
    <text x="20" y="380" class="t prompt">$</text>
    <text x="35" y="380" class="t cmd"> git commit -m "feat: add tax calculator"</text>
  </g>

  <g class="s2-l2">
    <text x="20" y="405" class="t check">✓</text>
    <text x="40" y="405" class="t pass">ruff check passed</text>
  </g>
  <g class="s2-l3">
    <text x="20" y="425" class="t check">✓</text>
    <text x="40" y="425" class="t pass">pytest 357 passed</text>
  </g>
  <g class="s2-l4">
    <text x="20" y="445" class="t check">✓</text>
    <text x="40" y="445" class="t pass">tsc --noEmit passed</text>
  </g>
  <g class="s2-l5">
    <text x="20" y="465" class="t check">✓</text>
    <text x="40" y="465" class="t pass">eslint --max-warnings 0 passed</text>
  </g>

  <g class="s2-l6">
    <text x="20" y="495" class="t pass">[main a1b2c3d] feat: add tax calculator</text>
  </g>

  <!-- Scene 3: Ripple check (sidebar) -->
  <g class="s3-l1">
    <text x="480" y="405" class="t warn">RIPPLE CHECK: calculate_tax used in:</text>
  </g>
  <g class="s3-l2">
    <text x="490" y="425" class="t dim">calculate_tax → api.py:42 views.py:18</text>
  </g>
  <g class="s3-l3">
    <text x="490" y="445" class="t dim">Did you update all callers?</text>
  </g>
</svg>
