<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 580">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252540"/>
      <stop offset="100%" stop-color="#1e1e35"/>
    </linearGradient>
    <linearGradient id="red-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f38ba8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f38ba8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="green-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a6e3a1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a6e3a1" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    @keyframes scene1 { 0%,3%{opacity:0} 5%,47%{opacity:1} 50%,100%{opacity:0} }
    @keyframes scene2 { 0%,50%,53%{opacity:0} 55%,95%{opacity:1} 98%,100%{opacity:0} }

    @keyframes popIn1 { 0%,8%{opacity:0;transform:translateY(10px)} 12%,47%{opacity:1;transform:translateY(0)} 50%,100%{opacity:0} }
    @keyframes popIn2 { 0%,16%{opacity:0;transform:translateY(10px)} 20%,47%{opacity:1;transform:translateY(0)} 50%,100%{opacity:0} }
    @keyframes popIn3 { 0%,24%{opacity:0;transform:translateY(10px)} 28%,47%{opacity:1;transform:translateY(0)} 50%,100%{opacity:0} }
    @keyframes popIn4 { 0%,32%{opacity:0;transform:translateY(10px)} 36%,47%{opacity:1;transform:translateY(0)} 50%,100%{opacity:0} }

    @keyframes popIn5 { 0%,58%{opacity:0;transform:translateY(10px)} 62%,95%{opacity:1;transform:translateY(0)} 98%,100%{opacity:0} }
    @keyframes popIn6 { 0%,64%{opacity:0;transform:translateY(10px)} 68%,95%{opacity:1;transform:translateY(0)} 98%,100%{opacity:0} }
    @keyframes popIn7 { 0%,70%{opacity:0;transform:translateY(10px)} 74%,95%{opacity:1;transform:translateY(0)} 98%,100%{opacity:0} }
    @keyframes popIn8 { 0%,76%{opacity:0;transform:translateY(10px)} 80%,95%{opacity:1;transform:translateY(0)} 98%,100%{opacity:0} }

    @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

    .t { font-family: -apple-system,'Segoe UI',Helvetica,Arial,sans-serif; }
    .mono { font-family: 'SF Mono','Cascadia Code','Fira Code',Consolas,monospace; }
    .red { fill: #f38ba8; }
    .orange { fill: #fab387; }
    .green { fill: #a6e3a1; }
    .blue { fill: #89b4fa; }
    .mauve { fill: #cba6f7; }
    .text { fill: #cdd6f4; }
    .dim { fill: #6c7086; }
    .white { fill: #ffffff; }

    .s1 { animation: scene1 14s ease infinite; }
    .p1 { animation: popIn1 14s ease infinite; }
    .p2 { animation: popIn2 14s ease infinite; }
    .p3 { animation: popIn3 14s ease infinite; }
    .p4 { animation: popIn4 14s ease infinite; }

    .s2 { animation: scene2 14s ease infinite; }
    .p5 { animation: popIn5 14s ease infinite; }
    .p6 { animation: popIn6 14s ease infinite; }
    .p7 { animation: popIn7 14s ease infinite; }
    .p8 { animation: popIn8 14s ease infinite; }

    .blink { animation: pulse 2s ease infinite; }
  </style>

  <!-- Background -->
  <rect width="840" height="580" rx="12" fill="url(#bg)"/>

  <!-- Top badge -->
  <rect x="310" y="16" width="220" height="28" rx="14" fill="#252540" stroke="#454570" stroke-width="1"/>
  <text x="420" y="35" text-anchor="middle" class="t dim" font-size="12" font-weight="500">claude-senior v1.0</text>

  <!-- ═══════ SCENE 1: WITHOUT / PROBLEMS ═══════ -->
  <g class="s1">
    <text x="420" y="82" text-anchor="middle" class="t red" font-size="22" font-weight="700">Without claude-senior</text>
    <text x="420" y="106" text-anchor="middle" class="t dim" font-size="14">Claude Code ships broken code and calls it "done"</text>
  </g>

  <!-- Problem cards -->
  <g class="p1">
    <rect x="40" y="130" width="360" height="88" rx="10" fill="url(#card)" filter="url(#shadow)"/>
    <rect x="40" y="130" width="4" height="88" rx="2" fill="#f38ba8"/>
    <text x="60" y="158" class="t red" font-size="20">✗</text>
    <text x="85" y="157" class="t text" font-size="14" font-weight="600">Commits console.log &amp; any types</text>
    <text x="85" y="178" class="mono dim" font-size="12">console.log("debug:", data)</text>
    <text x="85" y="198" class="mono dim" font-size="12">function process(x: any): any { }</text>
  </g>

  <g class="p2">
    <rect x="440" y="130" width="360" height="88" rx="10" fill="url(#card)" filter="url(#shadow)"/>
    <rect x="440" y="130" width="4" height="88" rx="2" fill="#f38ba8"/>
    <text x="460" y="158" class="t red" font-size="20">✗</text>
    <text x="485" y="157" class="t text" font-size="14" font-weight="600">Changes function, forgets callers</text>
    <text x="485" y="178" class="mono dim" font-size="12">Changed calculate_tax() signature</text>
    <text x="485" y="198" class="mono dim" font-size="12">4 files still call the old version</text>
  </g>

  <g class="p3">
    <rect x="40" y="238" width="360" height="88" rx="10" fill="url(#card)" filter="url(#shadow)"/>
    <rect x="40" y="238" width="4" height="88" rx="2" fill="#f38ba8"/>
    <text x="60" y="266" class="t red" font-size="20">✗</text>
    <text x="85" y="265" class="t text" font-size="14" font-weight="600">Says "done" without running tests</text>
    <text x="85" y="286" class="mono dim" font-size="12">"I've fixed the bug" → tests are broken</text>
    <text x="85" y="306" class="mono dim" font-size="12">"Should work" = hasn't verified</text>
  </g>

  <g class="p4">
    <rect x="440" y="238" width="360" height="88" rx="10" fill="url(#card)" filter="url(#shadow)"/>
    <rect x="440" y="238" width="4" height="88" rx="2" fill="#f38ba8"/>
    <text x="460" y="266" class="t red" font-size="20">✗</text>
    <text x="485" y="265" class="t text" font-size="14" font-weight="600">Runs git push --force, rm -rf</text>
    <text x="485" y="286" class="mono dim" font-size="12">Destroys remote history</text>
    <text x="485" y="306" class="mono dim" font-size="12">Deletes source directories</text>
  </g>

  <!-- Bottom tagline scene 1 -->
  <g class="s1">
    <rect x="200" y="360" width="440" height="44" rx="22" fill="none" stroke="#f38ba8" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="420" y="387" text-anchor="middle" class="t red" font-size="15" font-weight="600">You won't catch it — you never read the code</text>
  </g>

  <!-- ═══════ SCENE 2: WITH / SOLUTIONS ═══════ -->
  <g class="s2">
    <text x="420" y="82" text-anchor="middle" class="t green" font-size="22" font-weight="700">With claude-senior</text>
    <text x="420" y="106" text-anchor="middle" class="t dim" font-size="14">7 hooks + 10 behavioral rules + persistent memory</text>
  </g>

  <g class="p5">
    <rect x="40" y="130" width="360" height="88" rx="10" fill="url(#card)" filter="url(#shadow)"/>
    <rect x="40" y="130" width="4" height="88" rx="2" fill="#a6e3a1"/>
    <text x="60" y="158" class="t green" font-size="20">✓</text>
    <text x="85" y="157" class="t text" font-size="14" font-weight="600">Blocks bad code before commit</text>
    <text x="85" y="178" class="mono green" font-size="12">console.log → BLOCKED</text>
    <text x="85" y="198" class="mono green" font-size="12">any types → BLOCKED · catch {} → BLOCKED</text>
  </g>

  <g class="p6">
    <rect x="440" y="130" width="360" height="88" rx="10" fill="url(#card)" filter="url(#shadow)"/>
    <rect x="440" y="130" width="4" height="88" rx="2" fill="#a6e3a1"/>
    <text x="460" y="158" class="t green" font-size="20">✓</text>
    <text x="485" y="157" class="t text" font-size="14" font-weight="600">Warns about affected callers</text>
    <text x="485" y="178" class="mono green" font-size="12">RIPPLE CHECK: calculate_tax used in</text>
    <text x="485" y="198" class="mono green" font-size="12">→ api.py:42  service.py:18  views.py:7</text>
  </g>

  <g class="p7">
    <rect x="40" y="238" width="360" height="88" rx="10" fill="url(#card)" filter="url(#shadow)"/>
    <rect x="40" y="238" width="4" height="88" rx="2" fill="#a6e3a1"/>
    <text x="60" y="266" class="t green" font-size="20">✓</text>
    <text x="85" y="265" class="t text" font-size="14" font-weight="600">Runs all checks automatically</text>
    <text x="85" y="286" class="mono green" font-size="12">ruff ✓  pytest ✓  tsc ✓  eslint ✓</text>
    <text x="85" y="306" class="mono green" font-size="12">No bypass. Fix the code, retry.</text>
  </g>

  <g class="p8">
    <rect x="440" y="238" width="360" height="88" rx="10" fill="url(#card)" filter="url(#shadow)"/>
    <rect x="440" y="238" width="4" height="88" rx="2" fill="#a6e3a1"/>
    <text x="460" y="266" class="t green" font-size="20">✓</text>
    <text x="485" y="265" class="t text" font-size="14" font-weight="600">Blocks destructive commands</text>
    <text x="485" y="286" class="mono green" font-size="12">git push --force → BLOCKED</text>
    <text x="485" y="306" class="mono green" font-size="12">rm -rf src/ → BLOCKED · .env → BLOCKED</text>
  </g>

  <!-- Bottom tagline scene 2 -->
  <g class="s2">
    <rect x="200" y="360" width="440" height="44" rx="22" fill="none" stroke="#a6e3a1" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="420" y="387" text-anchor="middle" class="t green" font-size="15" font-weight="600">The AI catches its own mistakes before you see them</text>
  </g>

  <!-- Bottom stats (always visible) -->
  <g>
    <rect x="80" y="430" width="200" height="70" rx="10" fill="url(#card)" filter="url(#shadow)"/>
    <text x="180" y="460" text-anchor="middle" class="t blue" font-size="24" font-weight="700">7</text>
    <text x="180" y="482" text-anchor="middle" class="t dim" font-size="12">automated hooks</text>

    <rect x="320" y="430" width="200" height="70" rx="10" fill="url(#card)" filter="url(#shadow)"/>
    <text x="420" y="460" text-anchor="middle" class="t mauve" font-size="24" font-weight="700">10</text>
    <text x="420" y="482" text-anchor="middle" class="t dim" font-size="12">behavioral rules</text>

    <rect x="560" y="430" width="200" height="70" rx="10" fill="url(#card)" filter="url(#shadow)"/>
    <text x="660" y="460" text-anchor="middle" class="t orange" font-size="24" font-weight="700">3 min</text>
    <text x="660" y="482" text-anchor="middle" class="t dim" font-size="12">to install</text>
  </g>

  <!-- Install hint -->
  <text x="420" y="540" text-anchor="middle" class="mono dim" font-size="12">git clone https://github.com/Antrakt92/claude-senior.git &amp;&amp; bash install.sh</text>
  <text x="420" y="565" text-anchor="middle" class="t dim" font-size="11" class="blink">★ Star if this saved your AI from shipping broken code</text>
</svg>
